<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 МОГОЙ ТОГЛООМ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #050510;
    --grid: #0a0a2e;
    --neon-green: #00ff88;
    --neon-blue: #00cfff;
    --neon-pink: #ff006e;
    --neon-yellow: #ffe600;
    --glow-green: 0 0 10px #00ff88, 0 0 30px #00ff8866, 0 0 60px #00ff8833;
    --glow-blue: 0 0 10px #00cfff, 0 0 30px #00cfff66;
    --glow-pink: 0 0 10px #ff006e, 0 0 30px #ff006e66;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Orbitron', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    color: white;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,207,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,207,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 20s linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes gridMove {
    0% { transform: translateY(0); }
    100% { transform: translateY(40px); }
  }

  .wrapper {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  h1 {
    font-size: clamp(1.5rem, 5vw, 2.8rem);
    font-weight: 900;
    letter-spacing: 0.2em;
    color: var(--neon-green);
    text-shadow: var(--glow-green);
    text-transform: uppercase;
    animation: flicker 4s infinite;
  }

  @keyframes flicker {
    0%, 95%, 100% { opacity: 1; }
    96% { opacity: 0.7; }
    97% { opacity: 1; }
    98% { opacity: 0.5; }
    99% { opacity: 1; }
  }

  .hud {
    display: flex;
    gap: 40px;
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(0.8rem, 2vw, 1rem);
  }

  .hud-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .hud-label {
    color: var(--neon-blue);
    font-size: 0.65em;
    letter-spacing: 0.15em;
    opacity: 0.8;
  }

  .hud-value {
    color: white;
    font-size: 1.4em;
    font-weight: bold;
    text-shadow: var(--glow-blue);
    min-width: 60px;
    text-align: center;
  }

  .canvas-wrap {
    position: relative;
    border: 2px solid var(--neon-blue);
    box-shadow: var(--glow-blue), inset 0 0 40px rgba(0,207,255,0.05);
    border-radius: 4px;
  }

  canvas {
    display: block;
    background: var(--bg);
  }

  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(5, 5, 16, 0.92);
    backdrop-filter: blur(4px);
    gap: 16px;
    transition: opacity 0.3s;
  }

  .overlay.hidden { display: none; }

  .overlay-title {
    font-size: clamp(1.2rem, 4vw, 2rem);
    font-weight: 900;
    letter-spacing: 0.1em;
    color: var(--neon-pink);
    text-shadow: var(--glow-pink);
    text-align: center;
    padding: 0 20px;
  }

  .overlay-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(0.75rem, 2vw, 0.9rem);
    color: var(--neon-blue);
    opacity: 0.8;
    text-align: center;
    padding: 0 20px;
    line-height: 1.8;
  }

  .btn {
    margin-top: 8px;
    padding: 12px 36px;
    background: transparent;
    border: 2px solid var(--neon-green);
    color: var(--neon-green);
    font-family: 'Orbitron', monospace;
    font-size: clamp(0.8rem, 2vw, 1rem);
    font-weight: 700;
    letter-spacing: 0.15em;
    cursor: pointer;
    text-transform: uppercase;
    box-shadow: var(--glow-green);
    transition: all 0.2s;
    border-radius: 2px;
  }

  .btn:hover {
    background: var(--neon-green);
    color: var(--bg);
    box-shadow: var(--glow-green), inset 0 0 20px rgba(0,255,136,0.3);
    transform: scale(1.05);
  }

  .controls {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(0.65rem, 1.5vw, 0.78rem);
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.05em;
  }

  .key-row {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .key {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px; height: 28px;
    border: 1px solid rgba(0,207,255,0.3);
    border-radius: 4px;
    color: var(--neon-blue);
    font-size: 0.9em;
    background: rgba(0,207,255,0.05);
  }

  /* Mobile d-pad */
  .dpad {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    margin-top: 8px;
  }

  .dpad-row { display: flex; gap: 4px; }

  .dpad-btn {
    width: 52px; height: 52px;
    background: rgba(0,207,255,0.08);
    border: 1.5px solid rgba(0,207,255,0.35);
    border-radius: 8px;
    color: var(--neon-blue);
    font-size: 1.3rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .dpad-btn:active {
    background: rgba(0,207,255,0.25);
    box-shadow: var(--glow-blue);
  }

  @media (max-width: 600px) {
    .controls { display: none; }
    .dpad { display: flex; }
  }
</style>
</head>
<body>
<div class="wrapper">
  <h1>🐍 Могой</h1>

  <div class="hud">
    <div class="hud-item">
      <span class="hud-label">ОНОО</span>
      <span class="hud-value" id="score">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">ХАМГИЙН ӨНДӨР</span>
      <span class="hud-value" id="best">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">ТҮВШИН</span>
      <span class="hud-value" id="level">1</span>
    </div>
  </div>

  <div class="canvas-wrap">
    <canvas id="c"></canvas>

    <div class="overlay" id="overlay">
      <div class="overlay-title" id="ov-title">МОГОЙ ТОГЛООМ</div>
      <div class="overlay-sub" id="ov-sub">
        Хоолоо идэж өс!<br>
        Гар: ← ↑ → ↓<br>
        Утас: доорх товчлуур
      </div>
      <button class="btn" id="startBtn">ЭХЛЭХ</button>
    </div>
  </div>

  <div class="controls">
    <div class="key-row">
      <span class="key">↑</span>
    </div>
    <div class="key-row">
      <span class="key">←</span>
      <span class="key">↓</span>
      <span class="key">→</span>
    </div>
    <span style="margin-top:4px">Чиглэл удирдах</span>
  </div>

  <div class="dpad">
    <div class="dpad-row">
      <div class="dpad-btn" data-dir="UP">▲</div>
    </div>
    <div class="dpad-row">
      <div class="dpad-btn" data-dir="LEFT">◀</div>
      <div class="dpad-btn" data-dir="DOWN">▼</div>
      <div class="dpad-btn" data-dir="RIGHT">▶</div>
    </div>
  </div>
</div>

<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  // Responsive size
  const MAX = Math.min(window.innerWidth - 40, window.innerHeight - 260, 500);
  const CELL = 20;
  const COLS = Math.floor(MAX / CELL);
  const ROWS = Math.floor(MAX / CELL);
  canvas.width = COLS * CELL;
  canvas.height = ROWS * CELL;

  const overlay = document.getElementById('overlay');
  const ovTitle = document.getElementById('ov-title');
  const ovSub = document.getElementById('ov-sub');
  const startBtn = document.getElementById('startBtn');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const levelEl = document.getElementById('level');

  let snake, dir, nextDir, food, particles, score, best, level, speed, running, raf;

  best = parseInt(localStorage.getItem('snake_best') || '0');
  bestEl.textContent = best;

  const COLORS = {
    head: '#00ff88',
    body: ['#00ff88','#00e87c','#00d470'],
    food: '#ff006e',
    particle: ['#ff006e','#ffe600','#00cfff','#ff8800'],
  };

  function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

  function initGame() {
    const cx = Math.floor(COLS / 2), cy = Math.floor(ROWS / 2);
    snake = [{x: cx, y: cy},{x: cx-1, y: cy},{x: cx-2, y: cy}];
    dir = {x: 1, y: 0};
    nextDir = {x: 1, y: 0};
    particles = [];
    score = 0;
    level = 1;
    speed = 150;
    scoreEl.textContent = 0;
    levelEl.textContent = 1;
    placeFood();
    running = true;
    overlay.classList.add('hidden');
    if (raf) cancelAnimationFrame(raf);
    lastTime = 0;
    loop(0);
  }

  function placeFood() {
    let pos;
    do {
      pos = {x: rand(0, COLS-1), y: rand(0, ROWS-1)};
    } while (snake.some(s => s.x === pos.x && s.y === pos.y));
    food = pos;
  }

  // Particle system
  function spawnParticles(x, y) {
    for (let i = 0; i < 14; i++) {
      const angle = (Math.PI * 2 / 14) * i + rand(-10,10)*0.1;
      const spd = rand(2, 6);
      particles.push({
        x: x * CELL + CELL/2,
        y: y * CELL + CELL/2,
        vx: Math.cos(angle) * spd,
        vy: Math.sin(angle) * spd,
        life: 1,
        decay: rand(3,6)*0.01,
        color: COLORS.particle[rand(0, COLORS.particle.length-1)],
        size: rand(2,5)
      });
    }
  }

  function updateParticles() {
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      p.vx *= 0.92; p.vy *= 0.92;
      p.life -= p.decay;
    });
  }

  function drawParticles() {
    particles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    });
  }

  function drawSnake() {
    snake.forEach((seg, i) => {
      const isHead = i === 0;
      const t = 1 - i / snake.length;
      const alpha = 0.4 + 0.6 * t;

      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = isHead ? COLORS.head : `hsl(${150 - i * 2}, 100%, ${55 - i * 0.3}%)`;
      ctx.shadowColor = isHead ? '#00ff88' : '#00cc66';
      ctx.shadowBlur = isHead ? 20 : 8;

      const pad = isHead ? 1 : 2;
      const r = isHead ? 6 : 4;
      const x = seg.x * CELL + pad;
      const y = seg.y * CELL + pad;
      const w = CELL - pad*2;

      roundRect(ctx, x, y, w, w, r);
      ctx.fill();

      // Eyes on head
      if (isHead) {
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#050510';
        ctx.shadowBlur = 0;
        const ex = dir.x === 1 ? 0.65 : dir.x === -1 ? 0.15 : 0.3;
        const ex2 = dir.x === 1 ? 0.65 : dir.x === -1 ? 0.15 : 0.7;
        const ey = dir.y === 1 ? 0.65 : dir.y === -1 ? 0.15 : 0.3;
        const ey2 = dir.y === 1 ? 0.65 : dir.y === -1 ? 0.15 : 0.7;
        ctx.beginPath();
        ctx.arc(seg.x*CELL + CELL*ex, seg.y*CELL + CELL*ey, 2.2, 0, Math.PI*2);
        ctx.arc(seg.x*CELL + CELL*ex2, seg.y*CELL + CELL*ey2, 2.2, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.restore();
    });
  }

  function drawFood() {
    const fx = food.x * CELL + CELL/2;
    const fy = food.y * CELL + CELL/2;
    const t = Date.now() / 400;
    const pulse = 1 + Math.sin(t) * 0.15;

    ctx.save();
    ctx.fillStyle = COLORS.food;
    ctx.shadowColor = COLORS.food;
    ctx.shadowBlur = 20 + Math.sin(t) * 8;
    ctx.beginPath();
    ctx.arc(fx, fy, (CELL/2 - 3) * pulse, 0, Math.PI*2);
    ctx.fill();
    // Inner bright
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#ffaacc';
    ctx.beginPath();
    ctx.arc(fx - 2, fy - 2, 3, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y);
    ctx.quadraticCurveTo(x+w, y, x+w, y+r);
    ctx.lineTo(x+w, y+h-r);
    ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    ctx.lineTo(x+r, y+h);
    ctx.quadraticCurveTo(x, y+h, x, y+h-r);
    ctx.lineTo(x, y+r);
    ctx.quadraticCurveTo(x, y, x+r, y);
    ctx.closePath();
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Subtle grid
    ctx.strokeStyle = 'rgba(0,207,255,0.04)';
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= COLS; x++) {
      ctx.beginPath(); ctx.moveTo(x*CELL, 0); ctx.lineTo(x*CELL, canvas.height); ctx.stroke();
    }
    for (let y = 0; y <= ROWS; y++) {
      ctx.beginPath(); ctx.moveTo(0, y*CELL); ctx.lineTo(canvas.width, y*CELL); ctx.stroke();
    }

    drawParticles();
    drawFood();
    drawSnake();
  }

  let lastTime = 0, elapsed = 0;

  function loop(ts) {
    if (!running) return;
    raf = requestAnimationFrame(loop);
    const dt = ts - lastTime;
    lastTime = ts;
    elapsed += dt;

    if (elapsed >= speed) {
      elapsed = 0;
      update();
    }

    updateParticles();
    draw();
  }

  function update() {
    dir = {...nextDir};
    const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

    // Wall collision
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
      gameOver(); return;
    }

    // Self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      gameOver(); return;
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score += level * 10;
      scoreEl.textContent = score;
      spawnParticles(food.x, food.y);

      if (score > best) {
        best = score;
        bestEl.textContent = best;
        localStorage.setItem('snake_best', best);
      }

      // Level up every 5 food
      if (snake.length % 5 === 0) {
        level++;
        levelEl.textContent = level;
        speed = Math.max(60, 150 - (level-1)*15);
      }

      placeFood();
    } else {
      snake.pop();
    }
  }

  function gameOver() {
    running = false;
    ovTitle.textContent = 'ТОГЛООМ ДУУСЛАА';
    ovSub.innerHTML = `Таны оноо: <span style="color:#00ff88;font-size:1.4em">${score}</span><br>Хамгийн өндөр: <span style="color:#ffe600">${best}</span>`;
    startBtn.textContent = 'ДАХИН ТОГЛОХ';
    overlay.classList.remove('hidden');
  }

  startBtn.addEventListener('click', initGame);

  // Keyboard
  document.addEventListener('keydown', e => {
    if (!running) return;
    const map = {
      ArrowUp:    {x:0,y:-1}, w: {x:0,y:-1},
      ArrowDown:  {x:0,y:1},  s: {x:0,y:1},
      ArrowLeft:  {x:-1,y:0}, a: {x:-1,y:0},
      ArrowRight: {x:1,y:0},  d: {x:1,y:0},
    };
    const nd = map[e.key] || map[e.key.toLowerCase()];
    if (nd && !(nd.x === -dir.x && nd.y === -dir.y)) {
      nextDir = nd;
      e.preventDefault();
    }
  });

  // D-pad
  document.querySelectorAll('.dpad-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (!running) return;
      const map = {
        UP: {x:0,y:-1}, DOWN: {x:0,y:1},
        LEFT: {x:-1,y:0}, RIGHT: {x:1,y:0}
      };
      const nd = map[btn.dataset.dir];
      if (nd && !(nd.x === -dir.x && nd.y === -dir.y)) nextDir = nd;
    });
  });

  // Initial draw
  draw();
</script>
</body>
</html>
