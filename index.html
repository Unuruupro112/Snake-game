<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Snake Game</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { text-align: center; background: #000; color: #fff; }
        canvas { border: 1px solid #fff; display: block; margin: 0 auto; }
    </style>
</head>
<body>
    <h1>Snake Game</h1>
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let dx = 0, dy = 0;

        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "lime";
            snake.forEach(part => ctx.fillRect(part.x * 20, part.y * 20, 18, 18));
            
            ctx.fillStyle = "red";
            ctx.fillRect(food.x * 20, food.y * 20, 18, 18);
        }

        function update() {
            let head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                food = {x: Math.floor(Math.random()*20), y: Math.floor(Math.random()*20)};
            } else {
                snake.pop();
            }
        }

        setInterval(() => { update(); draw(); }, 100);
        document.onkeydown = (e) => {
            if(e.key === "ArrowUp") { dx=0; dy=-1; }
            if(e.key === "ArrowDown") { dx=0; dy=1; }
            if(e.key === "ArrowLeft") { dx=-1; dy=0; }
            if(e.key === "ArrowRight") { dx=1; dy=0; }
        };
    </script>
    
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
