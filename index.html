<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <link rel="manifest" href="manifest.json">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        body { 
            background: #050505; color: #00ffcc; font-family: 'Orbitron', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; text-align: center;
        }
        h1 { text-shadow: 0 0 10px #00ffcc; margin-bottom: 10px; }
        .stats { display: flex; gap: 20px; margin-bottom: 10px; font-size: 14px; }
        .stats div { border: 1px solid #00ffcc; padding: 5px 10px; border-radius: 5px; }
        
        canvas { 
            border: 2px solid #00ffcc; box-shadow: 0 0 15px #00ffcc; 
            background: #000; width: 350px; height: 350px;
        }
        
        .controls { display: grid; grid-template-columns: repeat(3, 70px); gap: 10px; margin-top: 20px; }
        button { 
            padding: 15px; font-size: 20px; border-radius: 50%; border: 2px solid #00ffcc;
            background: transparent; color: #00ffcc; box-shadow: 0 0 5px #00ffcc;
        }
        button:active { background: #00ffcc; color: #000; }
    </style>
</head>
<body>
    <h1>🐍 МОГОЙ</h1>
    <div class="stats">
        <div>Оноо: <span id="score">0</span></div>
        <div>Түвшин: 1</div>
    </div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    
    <div class="controls">
        <div></div><button onclick="changeDir('UP')">▲</button><div></div>
        <button onclick="changeDir('LEFT')">◀</button>
        <button onclick="changeDir('DOWN')">▼</button>
        <button onclick="changeDir('RIGHT')">▶</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        let snake = [{x: 200, y: 200}], food = {x: 100, y: 100}, dx = 20, dy = 0, score = 0;

        function changeDir(dir) {
            if (dir === 'UP' && dy === 0) { dx = 0; dy = -20; }
            if (dir === 'DOWN' && dy === 0) { dx = 0; dy = 20; }
            if (dir === 'LEFT' && dx === 0) { dx = -20; dy = 0; }
            if (dir === 'RIGHT' && dx === 0) { dx = 20; dy = 0; }
        }

        function draw() {
            ctx.fillStyle = "black"; ctx.fillRect(0, 0, 400, 400);
            ctx.fillStyle = "red"; ctx.fillRect(food.x, food.y, 18, 18);
            ctx.fillStyle = "#00ffcc";
            snake.forEach(p => ctx.fillRect(p.x, p.y, 18, 18));

            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                score += 10; scoreElement.innerText = score;
                food = {x: Math.floor(Math.random()*20)*20, y: Math.floor(Math.random()*20)*20};
            } else { snake.pop(); }
            
            if (head.x < 0 || head.x >= 400 || head.y < 0 || head.y >= 400) {
                alert("Game Over! Оноо: " + score); score = 0; scoreElement.innerText = score;
                snake = [{x: 200, y: 200}]; dx = 20; dy = 0;
            }
        }
        setInterval(draw, 150);

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
