<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐍 МОГОЙ ТОГЛООМ 🐍</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* Claude-ийн загварыг дуурайлгасан Neon CSS */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        body { 
            background: radial-gradient(circle, #101010 0%, #000000 100%); 
            color: #00ffcc; font-family: 'Orbitron', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            height: 100vh; margin: 0; padding: 20px 0;
            user-select: none; -webkit-user-select: none;
            touch-action: none; overflow: hidden;
        }

        h1 { margin: 0; text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc; font-size: 28px; }
        .emoji { font-size: 32px; vertical-align: middle; margin-right: 10px; }

        .stats-container { display: flex; justify-content: center; gap: 15px; margin-bottom: 5px; width: 100%; max-width: 400px; }
        .stats-box { 
            background: rgba(0, 0, 0, 0.7); border: 2px solid #00ffcc; 
            border-radius: 12px; padding: 8px 15px; text-align: center;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.4); flex: 1;
        }
        .stats-label { font-size: 11px; text-transform: uppercase; color: #ccffff; margin-bottom: 2px; }
        .stats-value { font-size: 18px; font-weight: 700; color: #00ffcc; }

        #gameArea { position: relative; width: 90vw; max-width: 400px; height: 90vw; max-height: 400px; }
        canvas { 
            background: #000; border: 2px solid #00ffcc; border-radius: 12px;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.6); 
            display: block; width: 100%; height: 100%;
        }

        .dpad-container { display: flex; justify-content: center; width: 100%; margin-top: 5px; margin-bottom: 50px; }
        .dpad { display: grid; grid-template-columns: repeat(3, 75px); grid-template-rows: repeat(2, 75px); gap: 10px; }
        .dpad-btn { 
            background: rgba(10, 10, 10, 0.8); border: 3px solid #00ffcc; border-radius: 50%;
            color: #00ffcc; font-size: 30px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.4); transition: all 0.1s;
        }
        .dpad-btn:active { background: #00ffcc; color: #000; box-shadow: 0 0 20px #00ffcc; transform: scale(0.95); }
        .up    { grid-column: 2; grid-row: 1; }
        .left  { grid-column: 1; grid-row: 2; }
        .down  { grid-column: 2; grid-row: 2; }
        .right { grid-column: 3; grid-row: 2; }
    </style>
</head>
<body>
    <h1><span class="emoji">🐍</span>МОГОЙ</h1>
    
    <div class="stats-container">
        <div class="stats-box">
            <div class="stats-label">ОНОО</div>
            <div id="score" class="stats-value">0</div>
        </div>
        <div class="stats-box">
            <div class="stats-label">ХАМГИЙН ӨНДӨР</div>
            <div id="highScore" class="stats-value">0</div>
        </div>
    </div>

    <div id="gameArea">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
    </div>

    <div class="dpad-container">
        <div class="dpad">
            <button class="dpad-btn up" onclick="changeDir('UP')">▲</button>
            <button class="dpad-btn left" onclick="changeDir('LEFT')">◀</button>
            <button class="dpad-btn down" onclick="changeDir('DOWN')">▼</button>
            <button class="dpad-btn right" onclick="changeDir('RIGHT')">▶</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const highScoreElement = document.getElementById("highScore");

        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        highScoreElement.innerText = highScore;

        let snake = [{x: 200, y: 200}], food = {x: 100, y: 100}, dx = 20, dy = 0, isGameOver = false;

        function changeDir(dir) {
            if (isGameOver) return resetGame();
            if (dir === 'UP' && dy === 0) { dx = 0; dy = -20; }
            if (dir === 'DOWN' && dy === 0) { dx = 0; dy = 20; }
            if (dir === 'LEFT' && dx === 0) { dx = -20; dy = 0; }
            if (dir === 'RIGHT' && dx === 0) { dx = 20; dy = 0; }
        }

        function placeFood() {
            food = {x: Math.floor(Math.random()*19 + 1)*20, y: Math.floor(Math.random()*19 + 1)*20};
        }

        function resetGame() {
            if (score > highScore) { highScore = score; localStorage.setItem('snakeHighScore', highScore); highScoreElement.innerText = highScore; }
            snake = [{x: 200, y: 200}]; dx = 20; dy = 0; score = 0; scoreElement.innerText = score; placeFood(); isGameOver = false;
        }

        function draw() {
            if (isGameOver) return;
            ctx.fillStyle = "black"; ctx.fillRect(0, 0, 400, 400);

            // "Neon" хоол зурах
            ctx.fillStyle = "red";
            ctx.shadowColor = "red"; ctx.shadowBlur = 10;
            ctx.fillRect(food.x, food.y, 19, 19);
            ctx.shadowBlur = 0; // Дараагийн зүйлсийг гэрэлтүүлэхгүй

            // "Neon" могой зурах
            ctx.fillStyle = "#00ffcc";
            ctx.shadowColor = "#00ffcc"; ctx.shadowBlur = 10;
            snake.forEach(p => ctx.fillRect(p.x, p.y, 19, 19));
            ctx.shadowBlur = 0;

            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                score += 10; scoreElement.innerText = score; placeFood();
            } else { snake.pop(); }
            
            if (head.x < 0 || head.x >= 400 || head.y < 0 || head.y >= 400) { isGameOver = true; alert("GAME OVER! Оноо: " + score); }
        }
        setInterval(draw, 140); // Бага зэрэг хурдасгалаа
        placeFood(); // Эхлээд хоол тавих

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
